name: Deploy to VPS

# Trigger: push to master branch
on:
  push:
    branches:
      - master
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'master'

jobs:
  deploy:
    name: Deploy to VPS (142.93.24.227)
    runs-on: ubuntu-latest
    # Only run on the private canonical repo, not the mirror
    if: github.repository == 'NoAutopilot/solana-narrative-trader'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 142.93.24.227 >> ~/.ssh/known_hosts

      - name: Deploy to VPS via deploy.sh
        run: |
          BRANCH="${{ github.event.inputs.branch || 'master' }}"
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              root@142.93.24.227 \
              "bash /root/solana_trader/deploy.sh $BRANCH"

      - name: Verify deployment proof
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              root@142.93.24.227 \
              "cat /root/solana_trader/deployment_proof.json && echo '' && cat /root/solana_trader/.deployed_sha"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
