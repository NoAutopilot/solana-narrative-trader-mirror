# External Review Packet — YAML Template
# Auto-generated by scripts/build_external_review_packet.py
# Do not edit manually. This template shows the expected structure.

packet_version: "1.0"
generated_at: "{ISO8601_timestamp}"
project: solana-narrative-trader

sections:
  - title: "Project Goal"
    content: "{project_goal_description}"
    constraints:
      - "{constraint_1}"
      - "{constraint_2}"

  - title: "Current Program Status"
    feature_tape_v2:
      status: "{COLLECTING | FROZEN}"
      fire_count: "{n}"
      collection_scope: full_universe
      analysis_scope: "eligible_only (primary), full_universe (audit)"
    active_services:
      - "{service_1}"
    inactive_services:
      - "{service_1}"
    phase: "{current_phase}"

  - title: "Benchmark Suite v1"
    description: "{benchmark_description}"
    key_results:
      baseline_gross_median_15m: 0.0
      baseline_net_median_15m: -0.005
      best_v1_gross_median_15m: 0.002
      best_v1_net_median_15m: -0.003
    conclusion: "{conclusion}"

  - title: "No-Go Registry v1"
    description: "{nogo_description}"
    entries:
      - family: momentum_direction
        feature: "{feature_name}"
        reason: "{reason}"
    count: 11

  - title: "Dataset Index"
    datasets:
      - name: universe_snapshot
        description: "{description}"
      - name: microstructure_log
        description: "{description}"
      - name: feature_tape_v2
        description: "{description}"

  - title: "Feature Acquisition v2 Status"
    planned_families:
      - id: 1
        name: "{family_name}"
        status: "{status}"
        priority: "{priority}"
    collection_target: "{target}"
    holdout_design: "{design}"

  - title: "Open Questions"
    questions:
      - id: OQ1
        question: "{question}"
        blocking: true
        expected_answer_date: "{date}"

  - title: "Next Decision Gate"
    gate: "{gate_name}"
    trigger: "{trigger_condition}"
    decision_options:
      - "{option_1}"
      - "{option_2}"
      - "{option_3}"
    decision_maker: "{who}"
    automated_input: "{file_path}"
